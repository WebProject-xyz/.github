on:
  workflow_call:
    inputs:
      php-version:
        description: "PHP version for the QA job (lint + static analysis)"
        default: "8.3"
        type: string
      test-matrix:
        description: >-
          JSON array of test matrix entries. Each entry must define
          `php-version` (string), `dependencies` (locked|highest|lowest),
          and `with_coverage` (boolean; set true on exactly one row to
          collect and upload coverage from that row). Override to add,
          drop, or reorder rows.
        default: |
          [
            {"php-version": "8.3", "dependencies": "locked",  "with_coverage": true},
            {"php-version": "8.4", "dependencies": "highest", "with_coverage": false},
            {"php-version": "8.5", "dependencies": "highest", "with_coverage": false}
          ]
        type: string
      with-coverage:
        description: "Deprecated, kept for migration only. Coverage is now controlled per matrix row via `test-matrix[].with_coverage`."
        default: false
        type: boolean
      coverage-path:
        description: "Path to coverage output directory"
        default: "tests/_output/"
        type: string
      php-cs-fixer-ignore-env:
        description: "Set PHP_CS_FIXER_IGNORE_ENV=true for QA job"
        default: false
        type: boolean
      with-codacy:
        description: "Enable Codacy security scan job"
        default: false
        type: boolean
      with-codecov:
        description: "Enable Codecov upload"
        default: false
        type: boolean
      with-release:
        description: "Enable semantic release job"
        default: true
        type: boolean

name: "CI"

permissions: {}

jobs:
  qa:
    name: "QA (lint + static analysis)"
    if: "!startsWith(github.event.head_commit.message, 'chore(release)')"
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    env:
      PHP_CS_FIXER_IGNORE_ENV: "${{ inputs.php-cs-fixer-ignore-env }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2

      - name: "Install PHP"
        uses: "shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f" # 2.37.0
        with:
          coverage: "none"
          php-version: "${{ inputs.php-version }}"

      - name: "Validate composer.json and composer.lock"
        if: "github.actor != 'renovate[bot]' || contains(github.head_ref, 'lock-file-maintenance')"
        run: "composer validate --ansi --strict"

      - name: "Determine composer cache directory"
        uses: "ergebnis/.github/actions/composer/determine-cache-directory@9785f99b3546d64df9cb331449e7fcdc41885d25" # 1.11.0

      - name: "Cache dependencies installed with composer"
        uses: "actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
        with:
          path: "${{ env.COMPOSER_CACHE_DIR }}"
          key: "php-${{ inputs.php-version }}-composer-locked-${{ hashFiles('composer.lock') }}"
          restore-keys: |
            php-${{ inputs.php-version }}-composer-locked-${{ github.ref_name }}
            php-${{ inputs.php-version }}-composer-locked-
            php-${{ inputs.php-version }}-composer-main

      - name: "Install locked dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@9785f99b3546d64df9cb331449e7fcdc41885d25" # 1.11.0
        with:
          dependencies: "${{ (github.actor == 'renovate[bot]' && !contains(github.head_ref, 'lock-file-maintenance')) && 'highest' || 'locked' }}"

      - name: "Build codeception suites"
        run: "vendor/bin/codecept build"

      - name: "Check coding style"
        run: "composer cs:check"

      - name: "Run static analysis"
        run: "composer stan"

  codacy:
    name: "Codacy Security Scan"
    if: "${{ inputs.with-codacy && !startsWith(github.event.head_commit.message, 'chore(release)') }}"
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
      security-events: write
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2

      - name: "Run Codacy Analysis CLI"
        uses: "codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08" # v4.4.7
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: false
          output: results.sarif
          format: sarif
          upload: true
          skip-uncommitted-files-check: true
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

  tests:
    name: "Tests (PHP ${{ matrix.php-version }}, ${{ matrix.dependencies }})"
    needs: [qa]
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.test-matrix) }}
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2

      - name: "Install PHP"
        uses: "shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f" # 2.37.0
        with:
          coverage: "${{ matrix.with_coverage == true && 'pcov' || 'none' }}"
          ini-values: display_errors=On, display_startup_errors=On, error_reporting=32767
          php-version: "${{ matrix.php-version }}"

      - name: "Set up problem matchers for PHP"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/php.json\""

      - name: "Set up problem matchers for phpunit/phpunit"
        run: "echo \"::add-matcher::${{ runner.tool_cache }}/phpunit.json\""

      - name: "Determine composer cache directory"
        uses: "ergebnis/.github/actions/composer/determine-cache-directory@9785f99b3546d64df9cb331449e7fcdc41885d25" # 1.11.0

      - name: "Cache dependencies installed with composer"
        uses: "actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
        with:
          path: "${{ env.COMPOSER_CACHE_DIR }}"
          key: "php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-${{ hashFiles('composer.lock') }}"
          restore-keys: |
            php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-${{ github.ref_name }}
            php-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-
            php-${{ matrix.php-version }}-composer-main

      - name: "Install ${{ matrix.dependencies }} dependencies with composer"
        uses: "ergebnis/.github/actions/composer/install@9785f99b3546d64df9cb331449e7fcdc41885d25" # 1.11.0
        with:
          dependencies: "${{ (github.actor == 'renovate[bot]' && !contains(github.head_ref, 'lock-file-maintenance') && matrix.dependencies == 'locked') && 'highest' || matrix.dependencies }}"

      - name: "Run Tests (coverage)"
        if: "${{ matrix.with_coverage == true }}"
        run: |
          vendor/bin/codecept build
          vendor/bin/codecept run --coverage --coverage-xml=coverage.xml --xml --report

      - name: "Run Tests"
        if: "${{ matrix.with_coverage != true }}"
        run: |
          vendor/bin/codecept build
          vendor/bin/codecept run --xml --report

      - name: "Upload coverage artifact"
        if: "${{ matrix.with_coverage == true }}"
        uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
        with:
          name: code-coverage-results
          path: "${{ inputs.coverage-path }}"
          retention-days: 5

      - name: "Upload Codacy coverage"
        if: "${{ matrix.with_coverage == true && inputs.with-codacy }}"
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r "./${{ inputs.coverage-path }}coverage.xml"

      - name: "Upload test results to Codecov"
        if: "${{ !cancelled() && matrix.with_coverage == true && inputs.with-codecov }}"
        uses: "codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2" # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "./${{ inputs.coverage-path }}report.xml"
          flags: unittests
          report_type: test_results
          fail_ci_if_error: true
          verbose: false

      - name: "Upload coverage to Codecov"
        if: "${{ !cancelled() && matrix.with_coverage == true && inputs.with-codecov }}"
        uses: "codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2" # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "./${{ inputs.coverage-path }}coverage.xml"
          flags: unittests
          fail_ci_if_error: true
          verbose: false

  release:
    name: "Release"
    if: "${{ inputs.with-release && github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release)') }}"
    needs:
      - tests
    runs-on: "ubuntu-latest"
    permissions: {}
    steps:
      - name: "Generate Token"
        id: generate_token
        uses: "actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3" # v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: "Semantic Release"
        uses: "cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90" # v6.0.0
        with:
          tag_format: "${version}"
          branches: |
            ['main']
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
